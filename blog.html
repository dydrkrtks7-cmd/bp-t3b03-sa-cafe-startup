        /* RESET & BASE */
        *, *::before, *::after {
            box-sizing: border-box;

        }
        html {

        /* CSS 변수 */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;

            --accent-neon: #00ff88;
            --accent-pink: #ff2d78;

        h1, h2, h3, h4, h5, h6 {

            letter-spacing: -0.02em;
            color: var(--text-primary);

        h1 {

        }
        h2 {

            line-height: 1.3;
            margin-bottom: 1.2rem;
            border-left: 6px solid var(--accent-neon);
            padding-left: 1rem;
        }
        h3 {
            font-size: 1.4rem;
            line-height: 1.4;
            margin-bottom: 0.8rem;
        }
        p, li {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        a {
            color: var(--accent-neon);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s, text-shadow 0.2s;
        }
        a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--accent-neon);
        }
        /* LAYOUT */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .section {
            padding: 4rem 0;
        }
        .section:last-of-type {
            padding-bottom: 6rem;
        }
        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-brutal);
            z-index: 1000;
            padding: 0.8rem 1.5rem;
        }
        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .nav-logo {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-neon);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--accent-neon);
        }
        .nav-links .active {
            color: var(--accent-neon);
            text-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
        }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
        }
        .hamburger span {
            width: 28px;
            height: 3px;
            background: var(--text-primary);
            margin: 4px 0;
            transition: 0.3s;
            border-radius: 2px;
        }
        .tel-link {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-neon));
            color: #000;
            font-weight: 700;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .tel-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 45, 120, 0.5);
        }
        /* ARTICLE */
        .blog-article {
            background: var(--bg-card);
            border: var(--border-brutal);
            padding: 2.5rem 3rem;
            margin-top: 2rem;
            position: relative;
        }
        .blog-article::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--accent-neon), var(--accent-pink), var(--accent-blue));
            z-index: -1;
            border-radius: 4px;
            opacity: 0.3;
        }
        .article-meta {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-neon);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .article-meta span {
            background: rgba(0, 255, 136, 0.1);
            padding: 0.2rem 0.8rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .blog-article blockquote {
            border-left: 4px solid var(--accent-pink);
            background: rgba(255, 45, 120, 0.05);
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--text-primary);
        }
        .blog-article blockquote p {
            margin-bottom: 0;
        }
        .blog-article .stat-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .blog-article .stat-item {
            background: var(--bg-secondary);
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .blog-article .stat-item .number {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-neon);
            display: block;
            line-height: 1;
        }
        .blog-article .stat-item .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        /* BUTTON */
        .btn-cta {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--accent-neon);
            color: #000;
            font-weight: 700;
            font-family: var(--font-mono);
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .btn-cta:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }
        /* FOOTER */
        footer {
            border-top: var(--border-brutal);
            padding: 3rem 0;
            background: var(--bg-secondary);
            text-align: center;
        }
        footer p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }
        footer a {
            color: var(--accent-neon);
        }
        /* HAMBURGER ACTIVE */
        .nav-links.open {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.98);
            border-bottom: var(--border-brutal);
            padding: 1.5rem;
            gap: 1.2rem;
        }
        /* RESPONSIVE 768px */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.6rem; }
            .container { padding: 0 1rem; }
            .blog-article { padding: 1.5rem 1.2rem; }
            .nav-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .tel-link {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            .stat-box {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
